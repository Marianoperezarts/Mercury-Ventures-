<title>Mercury Ventures Pitchdeck</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #e6e6e6;
  font-family: Arial, sans-serif;
}

/* WRAPPER */
.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

/* RESPONSIVE BOOK */
.book {
  position: relative;
  width: 90vw;                /* Scale with viewport */
  max-width: 1056px;          /* Never exceed original size */
  aspect-ratio: 11 / 8.5;     /* Maintain correct ratio */
  perspective: 2500px;
}

/* PAGE */
.page {
  position: absolute;
  width: 100%;
  height: 100%;
  transform-origin: left;
  transform-style: preserve-3d;
  transition: transform 1s ease;
  cursor: pointer;
  box-shadow: 0 10px 10px rgba(0,0,0,0.2);
}

/* FRONT + BACK */
.page .front,
.page .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
}

/* FRONT IMAGE */
.page .front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BACK */
.page .back {
  background: black;
  transform: rotateY(180deg);
}

/* Last page back white */
.page:last-child .back {
  background: white;
}

/* FLIP */
.page.flipped {
  transform: rotateY(-180deg);
}

/* CONTROLS */
.controls {
  margin-top: 20px;
  width: 90vw;
  max-width: 1056px;
  display: flex;
  justify-content: space-between;
}

button {
  padding: 10px 20px;
  border: none;
  background: #222;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #444;
}

/* Smaller screens adjustments */
@media (max-width: 600px) {
  button {
    font-size: 14px;
    padding: 8px 14px;
  }
}
</style>
</head>

    <button onclick="nextPage()">Next</button>

<script>
const pages = document.querySelectorAll(".page");
let current = 0;

/* Proper stacking */
pages.forEach((page, index) => {
  page.style.zIndex = pages.length - index;
});

function nextPage() {
  if (current < pages.length) {
    pages[current].classList.add("flipped");
    current++;
  }
}

function prevPage() {
  if (current > 0) {
    current--;
    pages[current].classList.remove("flipped");
  }
}

/* Click navigation */
document.getElementById("book").addEventListener("click", function(e) {
  const rect = this.getBoundingClientRect();
  const clickX = e.clientX - rect.left;

  if (clickX > rect.width / 2) {
    nextPage();
  } else {
    prevPage();
  }
});

/* Keyboard navigation */
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowRight") nextPage();
  if (e.key === "ArrowLeft") prevPage();
});
</script>
